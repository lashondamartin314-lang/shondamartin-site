</style>

<script>
(function(){'use strict';
const ICONS=['report','shield','tools','download','book','link'];
const SECTIONS=[
  {id:'cover', label:'Cover', short:'Start'},
  {id:'welcome', label:'Welcome', short:'Intro'},
  {id:'how-to-use', label:'How To Use This Kit', short:'How'},
  {id:'contents', label:'Contents', short:'TOC'},
  {id:'phases-rounds', label:'Phases and Rounds', short:'Map'},
  {id:'phase-map', label:'Dispute Path Map', short:'Path'},
  {id:'5-round-strategy', label:'5-Round Strategy', short:'Rounds'},
  {id:'account-router', label:'Account Router', short:'Router'},
  {id:'phase-1-prepare', label:'Phase 1 · Prepare', short:'P1'},
  {id:'phase-2-validate', label:'Phase 2 · Validate', short:'P2'},
  {id:'phase-3-clean-identity', label:'Phase 3 · Clean Identity', short:'P3'},
  {id:'phase-4-dispute-bureaus', label:'Phase 4 · Dispute Bureaus', short:'P4'},
  {id:'phase-5-challenge-furnishers', label:'Phase 5 · Challenge Furnishers', short:'P5'},
  {id:'phase-6-escalate', label:'Phase 6 · Escalate', short:'P6'},
  {id:'round-tracker', label:'Round Tracker', short:'Track'}
];
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function isSafeUrl(u){if(typeof u!=='string')return false;const t=u.trim();return /^(https?:|mailto:|tel:|\.?\/|[a-z0-9_-]+\.[a-z]{2,})/i.test(t)&&!/^javascript:/i.test(t)&&!/^data:/i.test(t);}
function renderButtons(buttons){
  const nav=document.getElementById('sidebar-nav');
  const sheet=document.getElementById('resources-sheet-list');
  const items=(buttons||[]).map(b=>{
    if(!b||!b.label||!isSafeUrl(b.url)) return '';
    const icon=ICONS.includes(b.icon)?b.icon:'link';
    return `<a class="sidebar-btn sidebar-btn-resource" href="${escapeHtml(b.url)}" target="_blank" rel="noopener"><span class="sidebar-btn-icon"><svg><use href="#icon-${icon}"></use></svg></span><span class="sidebar-btn-label">${escapeHtml(b.label)}</span><span class="sidebar-btn-arrow"><svg width="14" height="14"><use href="#icon-arrow"></use></svg></span></a>`;
  }).join('');
  if(nav) nav.innerHTML=items;
  if(sheet){
    sheet.innerHTML=(buttons||[]).map(b=>{
      if(!b||!b.label||!isSafeUrl(b.url)) return '';
      return `<a class="resource-chip" href="${escapeHtml(b.url)}" target="_blank" rel="noopener"><span>${escapeHtml(b.label)}</span><span>Open</span></a>`;
    }).join('');
    sheet.querySelectorAll('a').forEach(link=>link.addEventListener('click',()=>closeResourcesSheet()));
  }
}
function loadResources(){fetch('./resources.json',{cache:'no-cache'}).then(r=>r.ok?r.json():Promise.reject()).then(d=>{if(d&&Array.isArray(d.buttons))renderButtons(d.buttons);}).catch(()=>{});}
function getKitFrame(){return document.getElementById('main-content');}
function buildKitUrl(id){const suffix=id?`#${encodeURIComponent(id)}`:'';return `./kit.html?v=20260513a${suffix}`;}
function navigateToSection(id){
  const frame=getKitFrame();
  if(!frame)return;
  try{
    if(frame.contentWindow&&frame.contentWindow.location){
      frame.contentWindow.location.hash=id;
      frame.contentWindow.focus();
    }else{
      frame.src=buildKitUrl(id);
    }
  }catch(error){
    frame.src=buildKitUrl(id);
  }
  setActiveSection(id);
  closeTocSheet();
}
function setActiveSection(id){
  document.querySelectorAll('[data-section-link]').forEach(link=>{
    link.classList.toggle('active', link.dataset.sectionLink===id);
  });
}
function renderSections(){
  const sidebar=document.getElementById('sidebar-sections');
  const sheet=document.getElementById('toc-sheet-list');
  if(sidebar){
    sidebar.innerHTML=SECTIONS.map(section=>`<a class="sidebar-btn sidebar-btn-section" href="#${escapeHtml(section.id)}" data-section-link="${escapeHtml(section.id)}"><span class="sidebar-btn-icon"><svg><use href="#icon-book"></use></svg></span><span class="sidebar-btn-label">${escapeHtml(section.label)}</span><span class="sidebar-btn-arrow"><svg width="14" height="14"><use href="#icon-arrow"></use></svg></span></a>`).join('');
  }
  if(sheet){
    sheet.innerHTML=SECTIONS.map(section=>`<a class="toc-chip" href="#${escapeHtml(section.id)}" data-section-link="${escapeHtml(section.id)}"><span>${escapeHtml(section.label)}</span><span>${escapeHtml(section.short)}</span></a>`).join('');
  }
  document.querySelectorAll('[data-section-link]').forEach(link=>{
    link.addEventListener('click',event=>{
      event.preventDefault();
      navigateToSection(link.dataset.sectionLink);
      if(window.matchMedia('(max-width: 1099px)').matches){
        document.body.classList.remove('sidebar-open');
        const toggle=document.getElementById('menu-toggle');
        if(toggle) toggle.setAttribute('aria-expanded','false');
      }
    });
  });
}
function openTocSheet(){
  const sheet=document.getElementById('toc-sheet');
  const fab=document.getElementById('toc-fab');
  if(!sheet||!fab) return;
  closeResourcesSheet();
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden','false');
  fab.setAttribute('aria-expanded','true');
}
function closeTocSheet(){
  const sheet=document.getElementById('toc-sheet');
  const fab=document.getElementById('toc-fab');
  if(!sheet||!fab) return;
  sheet.classList.remove('open');
  sheet.setAttribute('aria-hidden','true');
  fab.setAttribute('aria-expanded','false');
}
function openResourcesSheet(){
  const sheet=document.getElementById('resources-sheet');
  const fab=document.getElementById('resources-fab');
  if(!sheet||!fab) return;
  closeTocSheet();
  sheet.classList.add('open');
  sheet.setAttribute('aria-hidden','false');
  fab.setAttribute('aria-expanded','true');
}
function closeResourcesSheet(){
  const sheet=document.getElementById('resources-sheet');
  const fab=document.getElementById('resources-fab');
  if(!sheet||!fab) return;
  sheet.classList.remove('open');
  sheet.setAttribute('aria-hidden','true');
  fab.setAttribute('aria-expanded','false');
}
function setupTocSheet(){
  const fab=document.getElementById('toc-fab');
  const close=document.getElementById('toc-sheet-close');
  if(fab) fab.addEventListener('click',()=>{const open=document.getElementById('toc-sheet')?.classList.contains('open'); open?closeTocSheet():openTocSheet();});
  if(close) close.addEventListener('click',closeTocSheet);
}
function setupResourcesSheet(){
  const fab=document.getElementById('resources-fab');
  const close=document.getElementById('resources-sheet-close');
  if(fab) fab.addEventListener('click',()=>{const open=document.getElementById('resources-sheet')?.classList.contains('open'); open?closeResourcesSheet():openResourcesSheet();});
  if(close) close.addEventListener('click',closeResourcesSheet);
}
function setupGlobalDismiss(){
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTocSheet();closeResourcesSheet();}});
}
function setupMobileToggle(){const toggle=document.getElementById('menu-toggle');const backdrop=document.getElementById('backdrop');if(!toggle||!backdrop)return;const close=()=>{document.body.classList.remove('sidebar-open');toggle.setAttribute('aria-expanded','false');};const open=()=>{document.body.classList.add('sidebar-open');toggle.setAttribute('aria-expanded','true');};toggle.addEventListener('click',()=>{document.body.classList.contains('sidebar-open')?close():open();});backdrop.addEventListener('click',close);document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});document.getElementById('sidebar').addEventListener('click',e=>{if(e.target.closest('a.sidebar-btn')&&window.matchMedia('(max-width: 1099px)').matches)close();});}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>{loadResources();renderSections();setupMobileToggle();setupTocSheet();setupResourcesSheet();setupGlobalDismiss();setActiveSection('cover');});}else{loadResources();renderSections();setupMobileToggle();setupTocSheet();setupResourcesSheet();setupGlobalDismiss();setActiveSection('cover');}
})();
</script>
</body>
</html>
